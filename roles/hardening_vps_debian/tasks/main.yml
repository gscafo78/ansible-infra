---
- name: Install security packages
  apt:
    name:
      - ufw
      - fail2ban
    state: present
    update_cache: yes

# ---------------- SSH HARDENING ----------------

- name: Disable root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: "PermitRootLogin {{ ssh_permit_root_login }}"
  notify: Restart ssh

- name: Disable password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: "PasswordAuthentication {{ ssh_password_authentication }}"
  notify: Restart ssh

- name: Restrict allowed SSH users
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^AllowUsers'
    line: "AllowUsers {{ ssh_allowed_users }}"
  notify: Restart ssh

# ---------------- UFW CONFIG ----------------

- name: Ensure UFW enabled
  ufw:
    state: enabled
    policy: deny

- name: Allow SSH only from whitelisted IPs
  ufw:
    rule: allow
    port: 22
    proto: tcp
    src: "{{ item }}"
  loop: "{{ ufw_allowed_ssh_ips }}"

- name: Allow Minecraft UDP port
  ufw:
    rule: allow
    port: "{{ minecraft_port }}"
    proto: udp

# ---------------- FAIL2BAN ----------------

- name: Deploy custom fail2ban jail
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: 0644
  notify: Restart fail2ban

- name: Ensure fail2ban running
  service:
    name: fail2ban
    state: started
    enabled: true
      
# ---------------- SYSCTL HARDENING ----------------

- name: Deploy sysctl hardening config
  template:
    src: 99-vps-hardening.conf.j2
    dest: /etc/sysctl.d/99-vps-hardening.conf
    owner: root
    group: root
    mode: 0644
  notify: Apply sysctl

- name: Apply sysctl settings
  command: sysctl --system
  when: false

# ---------------- DOCKER HARDENING ----------------

- name: Deploy hardened docker daemon config
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: 0644
  notify: Restart docker
