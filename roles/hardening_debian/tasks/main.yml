---
- name: Install security packages
  apt:
    name:
      - ufw
      - fail2ban
    state: present
    update_cache: yes

# SSH hardening

- name: Set PermitRootLogin
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: "PermitRootLogin {{ ssh_permit_root_login }}"
  notify: Restart ssh

- name: Disable password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: "PasswordAuthentication {{ ssh_password_authentication }}"
  notify: Restart ssh

- name: Set MaxAuthTries
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^MaxAuthTries'
    line: "MaxAuthTries {{ ssh_max_auth_tries }}"
  notify: Restart ssh

# Firewall

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
  when: enable_ufw

- name: Allow SSH
  ufw:
    rule: allow
    name: OpenSSH
  when: enable_ufw

# Fail2ban

- name: Ensure fail2ban running
  service:
    name: fail2ban
    state: started
    enabled: true
